version: "3.9"

services:

  postgres:
    image: postgres:17

    container_name: teamsync-postgres

    restart: always

    environment:
      POSTGRES_DB: teamsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: ./backend

    container_name: teamsync-web

    restart: always

    command: python manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app

    depends_on:
      - postgres

  nginx:
    image: nginx:latest

    container_name: teamsync-nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - web

volumes:
  postgres_data:
